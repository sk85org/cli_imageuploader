services:
  app:
    build: .
    restart: always
    environment:
      - API_KEY=${API_KEY:-my-super-password}
    volumes:
      - ./app:/app
      - ./images:/images
      - ./db:/db

  imaginary:
    image: h2non/imaginary:latest
    restart: always
    volumes:
      - ./images:/images
    environment:
      PORT: 9000
    command: -disable-endpoints form,health -mount /images  -enable-url-source -allowed-origins http://localhost
    deploy:
      replicas: 3

  nginx:
    image: nginx:latest
    depends_on:
      - app
      - imaginary
    ports:
      - '8587:80'
    restart: always
    volumes: 
      - ./templates:/etc/nginx/templates
      - ./nginx.conf:/etc/nginx/nginx.conf